name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build:prod

      - name: Copy index.html → 404.html (SPA routing)
        run: cp dist/bxzz-capital/browser/index.html dist/bxzz-capital/browser/404.html

      - name: Run tests
        run: npm test -- --ci --passWithNoTests

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/bxzz-capital/browser
          branch: gh-pages
          clean: true
